# Comic Data Capture ? database configuration
# ?????????????????????????????????????????????????????????????????????????????
# DEFAULT: embedded H2 (zero install, single-process).
# The database file is created automatically at:
#   ~/ComicDataCapture/data/comic_intake.mv.db
#
# NOTE: do NOT add AUTO_SERVER=TRUE ? it conflicts with the camera library's
# native device discovery and causes "Cannot execute task" errors on preview.
# ?????????????????????????????????????????????????????????????????????????????

db.url=jdbc:h2:~/ComicDataCapture/data/comic_intake;MODE=PostgreSQL
db.user=sa
db.password=

# ?????????????????????????????????????????????????????????????????????????????
# External PostgreSQL (enterprise / shared deployment)
# Uncomment and fill in to switch from H2 to a remote database.
# ?????????????????????????????????????????????????????????????????????????????
#db.url=jdbc:postgresql://localhost:5432/comic_intake
#db.user=postgres
#db.password=yourpassword